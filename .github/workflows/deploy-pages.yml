name: Deploy to GitHub Pages

# Builds the app with Vite and publishes the static `dist/` to GitHub Pages.
# The build uses a relative base (see vite.config.mjs), so it works whether the
# site is served from a user/org root, a project-pages subpath, or a custom
# domain — no base-path configuration needed here.
#
# NOTE: enable this once in the repo: Settings -> Pages -> Build and deployment
# -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
